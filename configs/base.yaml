project:
  random_state: 42
  target: isFraud

data:
  raw_dir: data/raw/ieee-fraud-detection
  interim_dir: data/interim
  processed_dir: data/processed
  output_name: ieee_train_time_split
  train_transaction: train_transaction.csv
  train_identity: train_identity.csv
  test_transaction: test_transaction.csv
  test_identity: test_identity.csv
  id_column: TransactionID
  time_column: TransactionDT
  train_size: 0.70
  valid_size: 0.15
  test_size: 0.15

features:
  high_missing_threshold: 0.95
  categorical_max_levels: 50
  numeric_bins: 10
  add_missing_indicators: true
  add_time_features: true
  add_amount_log: true

iv:
  bins: 10
  min_iv: 0.02
  max_iv: 0.50
  correlation_threshold: 0.80

training:
  schemes:
    - name: iv_ge_002
      label: "IV>=0.02"
      selection: ge
      min_iv: 0.02
      max_iv:
    - name: iv_002_050
      label: "0.02<=IV<=0.50"
      selection: range
      min_iv: 0.02
      max_iv: 0.50
    - name: iv_010_050
      label: "0.10<=IV<=0.50"
      selection: range
      min_iv: 0.10
      max_iv: 0.50
    - name: all_features
      label: all_features
      selection: all
      min_iv:
      max_iv:

evaluation:
  top_rates: [0.01, 0.03, 0.05, 0.10]
  threshold_metric: f1

explain:
  sample_size: 5000
  max_display: 30
  cache_sample_index: true

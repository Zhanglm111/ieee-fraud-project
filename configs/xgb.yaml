extends: base.yaml
model:
  name: xgboost
  params:
    n_estimators: 2000
    max_depth: 4
    learning_rate: 0.03
    subsample: 0.7
    colsample_bytree: 0.7
    min_child_weight: 10
    gamma: 0.2
    reg_alpha: 0.5
    reg_lambda: 5.0
    objective: binary:logistic
    eval_metric: aucpr
    tree_method: hist
    n_jobs: -1
  early_stopping_rounds: 100
